<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
        }
        .welcome-title {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .welcome-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .btn-custom {
            margin: 10px 5px;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1 class="welcome-title">Selamat Datang</h1>
        <p class="welcome-subtitle">Nikmati pengalaman terbaik bersama kami</p>
        <p class="mb-4 text-muted">Platform inovatif untuk memenuhi kebutuhan Anda</p>
        
        <div>
            <button class="btn btn-primary btn-custom">Mulai Sekarang</button>
            <button class="btn btn-outline-primary btn-custom">Pelajari Lebih Lanjut</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
